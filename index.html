<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교통약자 맞춤형 경로 추천 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 15px; display: inline-block; width: 31%; margin-right: 2%; }
        .form-group:last-of-type { margin-right: 0; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccd1d9; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background-color: #27ae60; }
        
        /* 지도 시각화 영역 */
        #map-area { width: 100%; height: 350px; background-color: #eef2f5; border: 2px solid #bdc3c7; border-radius: 10px; margin-top: 20px; position: relative; overflow: hidden; display: none; }
        .subway-line { position: absolute; border-radius: 10px; font-weight: bold; font-size: 11px; color: white; display: flex; align-items: center; justify-content: center; }
        .line1 { background-color: #003da5; } /* 1호선 파란색 */
        .line7 { background-color: #747f00; } /* 7호선 녹색 */
        .line6 { background-color: #cd7c2e; } /* 6호선 황토색 */
        .station-dot { position: absolute; width: 14px; height: 14px; background-color: white; border: 3px solid #34495e; border-radius: 50%; z-index: 10; font-size: 12px; font-weight: bold; white-space: nowrap; }
        
        .result-box { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; background-color: #e8f8f5; border-left: 5px solid #2ecc71; }
        .route-title { font-size: 18px; font-weight: bold; color: #16a085; margin-bottom: 10px; }
        .details { font-size: 14px; color: #555; line-height: 1.6; }
        .badge { display: inline-block; padding: 2px 6px; background: #e74c3c; color: white; border-radius: 4px; font-size: 11px; margin-right: 5px; }
        .badge-safe { background: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h2>♿ 교통약자 맞춤형 경로 시각화 시스템</h2>
    
    <div>
        <div class="form-group">
            <label>출발지</label>
            <select id="start"><option>의정부역 (1호선)</option></select>
        </div>
        <div class="form-group">
            <label>도착지</label>
            <select id="end"><option>화랑대역 (6호선)</option></select>
        </div>
        <div class="form-group">
            <label>설정 시간</label>
            <input type="text" value="2026-06-16 08:00 (화)" disabled style="background:#e9ecef;">
        </div>
    </div>
    
    <button onclick="drawRoute()">최적 이동편의 경로 탐색 및 지도 그리기</button>
    
    <div id="map-area">
        <div class="subway-line line1" style="width: 4px; height: 260px; top: 40px; left: 150px;"></div>
        <div class="subway-line line7" style="width: 4px; height: 160px; top: 120px; left: 150px; transform: rotate(-45deg); transform-origin: top left;"></div>
        <div class="subway-line line6" style="width: 280px; height: 4px; top: 260px; left: 150px;"></div>

        <div class="station-dot" style="top: 40px; left: 142px;"><span style="margin-left: 20px;">의정부역(출발)</span></div>
        <div class="station-dot" style="top: 120px; left: 142px;"><span style="margin-left: 20px; color: #16a085;">도봉산역(최적환승)</span></div>
        <div class="station-dot" style="top: 232px; left: 262px;"><span style="margin-left: 20px;">태릉입구역</span></div>
        <div class="station-dot" style="top: 252px; left: 142px;"><span style="margin-left: -90px; color: #e74c3c; opacity: 0.6;">석계역(혼잡패스)</span></div>
        <div class="station-dot" style="top: 252px; left: 382px;"><span style="margin-left: 20px;">화랑대역(도착)</span></div>

        <svg style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none;">
            <path d="M 150 47 L 150 127 L 270 240 L 390 260" fill="none" stroke="#2ecc71" stroke-width="6" stroke-dasharray="10,5" stroke-linecap="round"/>
        </svg>
    </div>
    
    <div id="result" class="result-box">
        <div class="route-title">🏆 데이터 연산 결과: 도봉산역 편의 환승 선출</div>
        <div class="details">
            <strong>📊 2026년 6월 16일 오전 8시 출근길 분석 리포트</strong><br>
            •
